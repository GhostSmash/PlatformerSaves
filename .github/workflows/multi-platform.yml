name: Build Geode Mod

on:
  workflow_dispatch:
  push:
    branches:
      - "**"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        config:
        - name: Windows
          os: windows-latest
          build-type: RelWithDebInfo

        - name: macOS
          os: macos-latest

        - name: Android32
          os: ubuntu-latest
          target: Android32

        - name: Android64
          os: ubuntu-latest
          target: Android64

        - name: iOS
          os: macos-latest
          target: iOS

    name: ${{ matrix.config.name }}
    runs-on: ${{ matrix.config.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Этот шаг принудительно заставит CMake выкачать зависимость ДО сборки мода
      - name: Pre-fetch PersistenceAPI
        shell: bash
        run: |
          cmake -B build -DGEODE_SDK=$ENV{GEODE_SDK} || true

      # Исправляем mod.json в зависимости, чтобы Geode SDK 5.8.2 не ругался
      - name: Patch PersistenceAPI Geode version
        shell: bash
        run: |
          if [ -f "build/_deps/persistenceapi-src/mod.json" ]; then
            sed -i 's/"geode": "[^"]*"/"geode": "*"/g' build/_deps/persistenceapi-src/mod.json
            echo "Successfully patched PersistenceAPI mod.json to support any Geode version!"
          else
            echo "Warning: mod.json not found, CMake might handle it later"
          fi

      - name: Build the mod
        uses: geode-sdk/build-geode-mod@main
        with:
          bindings: geode-sdk/bindings
          bindings-ref: main
          combine: true
          cli: "latest"
          sdk: "nightly"
          export-pdb: true
          target: ${{ matrix.config.target }}
          build-config: ${{ matrix.config.build-type || 'Release' }}

  package:
    name: Package builds
    runs-on: ubuntu-latest
    needs: ['build']

    steps:
      - uses: geode-sdk/build-geode-mod/combine@main
        id: build
  
      - uses: actions/upload-artifact@v4
        with:
          name: Build Output
          path: ${{ steps.build.outputs.build-output }}
          
